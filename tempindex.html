<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quinn Conroy | Landing</title>
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
    <link href="itis3135/styles/default2.css" rel="stylesheet" type="text/css">
</head>
<body>
    <header>
        <nav class="primary-nav">
            <a href="/tempindex.html" class="name-nav">Quinn Conroy</a>
            <div class="nav-links">
                <div class="nav-item" id="classes-menu">
                    <button class="nav-btn" onclick="toggleMenu('classes-menu')">Classes ▾</button>
                    <div class="dropdown">
                        <a href="/itis3135/" class="drop-item">Front-end Development</a>
                    </div>
                </div>
                <div class="nav-item" id="projects-menu">
                    <button class="nav-btn" onclick="toggleMenu('projects-menu')">Projects ▾</button>
                    <div class="dropdown">
                        <a href="/personal_projects/" class="drop-item">Personal Projects</a>
                    </div>
                </div>
                <div class="nav-item" id="about-menu">
                    <button class="nav-btn" onclick="toggleMenu('about-menu')">About Me</button>
                    <div class="dropdown">
                        <a href="/introduction.html" class="drop-item">Introduction</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    

    <script>
        /*toggles the dropdown menu for the nav bar*/
        function toggleMenu(id) {
            const el = document.getElementById(id);
            const wasOpen = el.classList.contains('open');
            document.querySelectorAll('.nav-item.open').forEach((e) => e.classList.remove('open'));
            if (!wasOpen) el.classList.add('open');
            }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.nav-item')) {
                document.querySelectorAll('.nav-item.open').forEach((el) => el.classList.remove('open'));
            }
        });
    </script>
</body>
</html>
