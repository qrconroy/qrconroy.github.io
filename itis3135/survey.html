<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITIS 3135 | FCC RWD Certification</title>
    <link href="styles/default.css" rel="stylesheet" type="text/css">
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <h1>FCC RWD Certification</h1>
        <h2>Survey</h2>
        <div data-include="components/header.html"></div>
        <script src="scripts/HTMLInclude-master/HTMLInclude.min.js"></script>
    </header>
    <p id="description">This is a survey form. Please fill it out!</p>

    <form id="survey-form">
      <label id="name-label" for="name">Name:</label>
      <input id="name" type="text" placeholder="Enter your name" required>

      <label id="email-label" for="email">Email:</label>
      <input id="email" type="email" placeholder="Enter your email" required>

      <label id="number-label" for="number">Age (optional):</label>
      <input id="number" type="number" min="10" max="99" placeholder="Age">

      <select id="dropdown">
        <option disabled selected value="">Select current role</option>
        <option value="Student">Full-time Student</option>
        <option value="part-time">Part-time Job</option>
        <option value="full-time">Full-time Job</option>
      </select>
      
      <p>Would you recommend us to a friend?</p>
      <label><input name="user-recommend" type="radio" value="definitely" checked>Definitely</label>
      <label><input name="user-recommend" type="radio" value="maybe">Maybe</label>
      <label><input name="user-recommend" type="radio" value="no">No</label>

      <p>What would you like to see improved?</p>
      <label><input type="checkbox" value="front-end">Front-end Projects</label>
      <label><input type="checkbox" value="back-end">Back-end Projects</label>

      <p>Have comments or suggestions?</p>
      <textarea rows="3" cols="5" placeholder="Enter your comments or suggestions here"></textarea>

      <button id="submit" type="submit">Submit</button>
    </form>

    <div data-include="components/footer.html"></div>
    <script src="scripts/HTMLInclude-master/HTMLInclude.min.js"></script>
</body>
</html>
