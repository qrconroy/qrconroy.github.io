<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITIS 3135 | FCC RWD Certification</title>
    <link href="styles/default.css" rel="stylesheet" type="text/css">
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
    <style>
        #playing-cards {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }

        .card {
            width: 180px; /* Slightly wider to fit the cat art better */
            height: 260px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 4px 4px 15px rgba(0, 0, 0, 0.4);
            position: relative; /* Essential: allows corners to pin to the edges */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Position the top-left corner */
        .left {
            position: absolute;
            top: 5px;
            left: 5px;
        }

        /* Keep the cat in the dead center */
        .middle img {
            width: 120px; 
            height: auto;
        }

        /* Position the bottom-right corner */
        .right {
            position: absolute;
            bottom: 5px;
            right: 5px;
            transform: rotate(180deg); /* Flips the symbol upside down */
        }

        .card p {
        font-size: 24px;
        margin: 0;
        font-family: serif; /* Looks more like a real card */
        }
    </style>
</head>

<body>
    <header>
        <h1>FCC RWD Certification</h1>
        <h2>Playing Cards</h2>
        <div data-include="components/header.html"></div>
        <script src="scripts/HTMLInclude-master/HTMLInclude.min.js"></script>
    </header>
  <main id="playing-cards">
  <div class="card">
    <div class="left">
        <p style="font-size: 24px; margin: 10px; color:black">A♠</p>
    </div>
    <div class="middle">
        <img src="images/black_cat_spade.png" alt="Ace of Spades" style="width: 100px; height: auto; margin: auto;">
    </div>
    <div class="right">
        <p style="font-size: 24px; margin: 10px; color:black">A♠</p>
    </div>
  </div>

  <div class="card">
    <div class="left">
        <p style="font-size: 24px; margin: 10px; color: black;">K♦</p>
    </div>
    <div class="middle">
        <img src="images/cat_king_diamonds.png" alt="King of Diamonds" style="width: 100px; height: auto; margin: auto;">
    </div>
    <div class="right">
        <p style="font-size: 24px; margin: 10px; color: black;">K♦</p>
    </div>
  </div>

  <div class="card">
    <div class="left">
        <p style="font-size: 24px; margin: 10px; color: red;">Q♥</p>
    </div>
    <div class="middle">
        <img src="images/Cat_queen_hearts.png" alt="Queen of Hearts" style="width: 100px; height: auto; margin: auto;">
    </div>
    <div class="right">
        <p style="font-size: 24px; margin: 10px; color: red;">Q♥</p>
    </div>
  </div>
  <div class="card">
    <div class="left">
        <p style="font-size: 24px; margin: 10px; color: black;">J♣</p>
    </div>
    <div class="middle">
        <img src="images/jack-of-clubs.png" alt="Jack of Clubs" style="width: 100px; height: auto; margin: auto;">
    </div>
    <div class="right">
        <p style="font-size: 24px; margin: 10px; color: black;">J♣</p>
    </div>
  </div>

  </main>
</body>

</html>
