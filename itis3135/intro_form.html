<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <div id="Name">
            <label for="f-name">First Name:</label>
            <input type="text" id="f-name" name="f-name" required><br><br>

            <label for="p-name">Preferred name/Nickname(optional):</label>
            <input type="text" id="p-name" name="p-name"><br><br>

            <label for="m-name">Middle Name(optional):</label>
            <input type="text" id="m-name" name="m-name"><br><br>

            <label for="l-name">Last Name:</label>
            <input type="text" id="l-name" name="l-name" required><br><br>
        </div>

        <div id="acknowledgement">
            <label for="acknowledgement">Acknowledgement Statement:</label>
            <input type="checkbox" id="acknowledgement" name="acknowledgement" required><br><br>

            <label for="ack-date">Acknowledgement Date:</label>
            <input type="date" id="ack-date" name="ack-date" required><br><br>
        </div>

        <div id="Personalization">
            <label for="mascot-adj">Mascot Adjective:</label>
            <input type="text" id="mascot-adj" name="mascot-adj" required placeholder="eg. Quizzical"><br><br>

            <label for="mascot-noun">Mascot Noun:</label>
            <input type="text" id="mascot-noun" name="mascot-noun" required placeholder="eg. Cat"><br><br>

            <label for="divider">Divider Symbol:</label>
            <input type="text" id="divider" name="divider" required placeholder="eg. |, ~"><br><br>

            <label for="picture">Portrait:</label>
            <input type="file" id="picture" name="picture" accept="image/*" required><br><br>

            <label for="picture-caption">Picture Caption:</label>
            <input type="text" id="picture-caption" name="picture-caption" required placeholder="Describe your picture..."><br><br>

            <label for="personal-statement">Personal Statement:</label><br>
            <input id="personal-statement" name="personal-statement" required placeholder="eg. 'I am a junior CS student...'"></textarea><br><br>
        </div>

        <div id="background">
            <label for="pers-background">Personal Background:</label><br>
            <textarea id="pers-background" name="pers-background" required placeholder="eg. 'I am from...'"></textarea><br><br>

            <label for="academic-background">Academic Background:</label><br>
            <textarea id="academic-background" name="academic-background" required placeholder="eg. 'I graduated with...'"></textarea><br><br>

            <label for="professional-background">Professional Background:</label><br>
            <textarea id="professional-background" name="professional-background" required placeholder="eg. 'I have experience working at...'"></textarea><br><br>

            <label for="subject-background">Subject Background:</label><br>
            <textarea id="subject-background" name="subject-background" required placeholder="eg. 'I have worked with...'"></textarea><br><br>
        </div>

        <div id="Computer">
            <label for="primary-computer">Primary Computer:</label>
            <input type="text" id="primary-computer" name="primary-computer" required placeholder="eg. 'Macbook Pro 16'"><br><br>

            <label for="secondary-computer">Secondary Computer:</label>
            <input type="text" id="secondary-computer" name="secondary-computer" placeholder="eg. 'Lenovo ThinkPad P16 2nd Gen'"><br><br>
        </div>

        <div id="courses">
            <!---- Course and sub-bullets, with fields for each of: department, number, name, reason. 
            also need a button to add more courses ---->
        </div>

        <div id="quote">
            <label for="quote">Favorite Quote:</label><br>
            <input id="quote" name="quote" required placeholder="eg. 'The only way to do great work is to love what you do.'"><br><br>

            <label for="quote-author">Quote Author:</label>
            <input type="text" id="quote-author" name="quote-author" required placeholder="eg. 'Steve Jobs'"><br><br>
        </div>

        <div id="misc">
            <label for="funny-thing" >Something Funny:</label><br>
            <input id="funny-thing" name="funny-thing" placeholder="eg. 'I once tried to...'"><br><br>
        </div>

        <input type="submit" value="Submit">

        <script src="scripts/introduction.js"></script>
    </form>
</body>
</html>
